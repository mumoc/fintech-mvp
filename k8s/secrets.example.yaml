# TEMPLATE ONLY — contains NO real secrets. Copy to secrets.yaml, fill with real
# values from your secrets manager, and keep secrets.yaml out of version control.
# In a real cluster these would be created by an external-secrets operator or
# sealed-secrets, never committed.
apiVersion: v1
kind: Secret
metadata:
  name: bravo-secrets
  namespace: bravo
  labels:
    app.kubernetes.io/part-of: bravo-fintech
type: Opaque
stringData:
  # Database
  DATABASE_PASSWORD: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  # Rails
  SECRET_KEY_BASE: "REPLACE_ME"
  RAILS_MASTER_KEY: "REPLACE_ME"
  # Auth
  JWT_SECRET: "REPLACE_ME"
  # PII encryption + blind index
  AR_ENCRYPTION_PRIMARY_KEY: "REPLACE_ME"
  AR_ENCRYPTION_DETERMINISTIC_KEY: "REPLACE_ME"
  AR_ENCRYPTION_KEY_DERIVATION_SALT: "REPLACE_ME"
  BLIND_INDEX_KEY: "REPLACE_ME"
  # Webhooks
  WEBHOOK_SIGNING_SECRET: "REPLACE_ME"
