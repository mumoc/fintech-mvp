apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: bravo
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: bravo-fintech
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/component: web
    spec:
      # Run/upgrade the schema (incl. PL/pgSQL triggers) before serving traffic.
      initContainers:
        - name: migrate
          image: bravo/fintech-api:latest
          command: ["./bin/rails", "db:prepare"]
          envFrom:
            - configMapRef:
                name: bravo-config
            - secretRef:
                name: bravo-secrets
      containers:
        - name: api
          image: bravo/fintech-api:latest
          command: ["./bin/rails", "server", "-b", "0.0.0.0", "-p", "3000"]
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: bravo-config
            - secretRef:
                name: bravo-secrets
          readinessProbe:
            httpGet:
              path: /up
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /up
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: bravo
  labels:
    app.kubernetes.io/name: api
spec:
  selector:
    app.kubernetes.io/name: api
  ports:
    - port: 3000
      targetPort: 3000
