apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bravo
  namespace: bravo
  labels:
    app.kubernetes.io/part-of: bravo-fintech
  annotations:
    # Long-lived upstreams for the ActionCable WebSocket (/cable).
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: app.bravo.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: api.bravo.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 3000
