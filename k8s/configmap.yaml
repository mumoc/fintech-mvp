apiVersion: v1
kind: ConfigMap
metadata:
  name: bravo-config
  namespace: bravo
  labels:
    app.kubernetes.io/part-of: bravo-fintech
data:
  RAILS_ENV: "production"
  RAILS_LOG_TO_STDOUT: "true"
  RAILS_MAX_THREADS: "5"
  # Service discovery (in-cluster service names).
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_USER: "bravo"
  DATABASE_NAME: "bravo_production"
  REDIS_URL: "redis://redis:6379/0"
  FRONTEND_ORIGINS: "https://app.bravo.example"
  OUTBOX_DISPATCH_INTERVAL: "1"
