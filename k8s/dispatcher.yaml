# Outbox dispatcher: continuously claims pending outbox_events with
# FOR UPDATE SKIP LOCKED and enqueues the matching jobs. Safe to run as multiple
# replicas — each skips rows locked by the others, so there is no double-claim.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcher
  namespace: bravo
  labels:
    app.kubernetes.io/name: dispatcher
    app.kubernetes.io/component: outbox
    app.kubernetes.io/part-of: bravo-fintech
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dispatcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dispatcher
        app.kubernetes.io/component: outbox
    spec:
      containers:
        - name: dispatcher
          image: bravo/fintech-api:latest
          command: ["bundle", "exec", "rake", "outbox:dispatch"]
          envFrom:
            - configMapRef:
                name: bravo-config
            - secretRef:
                name: bravo-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
