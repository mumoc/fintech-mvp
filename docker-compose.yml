# Local development stack for the Bravo Fintech MVP.
# `make up` boots api + postgres + redis and waits until the api is healthy.
# Dev credentials below are non-secret defaults; real secrets are injected via
# the environment in non-local environments (see .env.example / k8s).
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER:-bravo}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-bravo}
      POSTGRES_DB: ${DATABASE_NAME:-bravo_development}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-bravo}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build: .
    command: ./bin/rails server -b 0.0.0.0
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      DATABASE_HOST: postgres
      DATABASE_USER: ${DATABASE_USER:-bravo}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-bravo}
      DATABASE_NAME: ${DATABASE_NAME:-bravo_development}
      TEST_DATABASE_NAME: ${TEST_DATABASE_NAME:-bravo_test}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/up || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s

  # Sidekiq worker: processes jobs and runs the recurring outbox dispatcher.
  # Scale horizontally with `docker compose up --scale worker=N` (SKIP LOCKED
  # keeps parallel dispatchers from double-claiming events).
  worker:
    build: .
    command: bundle exec sidekiq
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      DATABASE_HOST: postgres
      DATABASE_USER: ${DATABASE_USER:-bravo}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-bravo}
      DATABASE_NAME: ${DATABASE_NAME:-bravo_development}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # React + Tailwind SPA (Vite dev server). Talks to the API at localhost:3000
  # from the browser (CORS allowed for http://localhost:5173).
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --no-fund --no-audit && npm run dev"
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api
    # No healthcheck: the SPA must not gate `make up --wait`. The dev server is
    # ready a few seconds after the container starts.

volumes:
  pg_data:
  redis_data:
  bundle_cache:
  frontend_node_modules:
